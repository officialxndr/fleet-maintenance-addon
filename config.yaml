name: "Fleet Maintenance Server"
description: "A standalone vehicle maintenance logbook."
version: "2.0.3"
slug: "fleet_maintenance"
init: false
arch:
  - aarch64
  - amd64
  - armv7

# --- THIS ENABLES THE USER-FRIENDLY TOGGLE ---
ingress: true
ingress_port: 5000  # <--- THIS IS THE MISSING LINK
panel_icon: "mdi:car-wrench"
panel_title: "Fleet Logbook"

map:
  - config:rw
options:
  # ... (keep your existing options)

# --- ADDS THE BUTTON TO THE ADD-ON PAGE ---
webui: "http://[HOST]:[PORT:5000]/" 

options:
  ha_url: "http://homeassistant.local:8123"
  ha_token: ""
  mqtt_broker: "core-mosquitto"
  mqtt_port: 1883
  mqtt_user: "addons"
  mqtt_pass: ""
schema:
  ha_url: str
  ha_token: password
  mqtt_broker: str
  mqtt_port: port
  mqtt_user: str
  mqtt_pass: password