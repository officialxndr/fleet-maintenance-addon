version: '3.8'

services:
  fleet-maintenance:
    image: ghcr.io/your-github-name/fleet-maintenance:latest
    container_name: fleet-maintenance
    build: .
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      # This maps their local 'data' folder to the app, so they don't lose data on updates
      - ./data:/app/data
    environment:
      # Standalone users can configure HA / MQTT by changing these!
      - HA_URL=http://192.168.1.100:8123
      - HA_TOKEN=paste_long_lived_token_here
      - MQTT_BROKER=192.168.1.100
      - MQTT_PORT=1883
      - MQTT_USER=my_mqtt_user
      - MQTT_PASS=my_mqtt_pass