<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fleet Maintenance</title>
    {% if vehicle_data %}
    <link rel="manifest" href="{{ ingress_path }}/manifest.json">
    <meta name="theme-color" content="#18181b">
    <link rel="apple-touch-icon" href="{{ ingress_path }}/static/icon.png">
    {% endif %}

    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>

    <style>
        .bg-pattern-solid {
            background-image: none;
        }

        .bg-pattern-dots {
            background-image: radial-gradient(rgba(156, 163, 175, 0.3) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .dark .bg-pattern-dots {
            background-image: radial-gradient(rgba(82, 82, 91, 0.4) 1px, transparent 1px);
        }

        .bg-pattern-grid {
            background-image: linear-gradient(rgba(156, 163, 175, 0.2) 1px, transparent 1px), linear-gradient(90deg, rgba(156, 163, 175, 0.2) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .dark .bg-pattern-grid {
            background-image: linear-gradient(rgba(82, 82, 91, 0.3) 1px, transparent 1px), linear-gradient(90deg, rgba(82, 82, 91, 0.3) 1px, transparent 1px);
        }

        .bg-pattern-ripples {
            background-image: repeating-radial-gradient(circle at 0 0, transparent 0, transparent 10px, rgba(156, 163, 175, 0.1) 10px, rgba(156, 163, 175, 0.1) 20px);
        }

        .dark .bg-pattern-ripples {
            background-image: repeating-radial-gradient(circle at 0 0, transparent 0, transparent 10px, rgba(82, 82, 91, 0.2) 10px, rgba(82, 82, 91, 0.2) 20px);
        }

        .bg-pattern-diamonds {
            background-image: linear-gradient(135deg, rgba(156, 163, 175, 0.1) 25%, transparent 25%), linear-gradient(225deg, rgba(156, 163, 175, 0.1) 25%, transparent 25%), linear-gradient(45deg, rgba(156, 163, 175, 0.1) 25%, transparent 25%), linear-gradient(315deg, rgba(156, 163, 175, 0.1) 25%, transparent 25%);
            background-position: 10px 0, 10px 0, 0 0, 0 0;
            background-size: 20px 20px;
        }

        .dark .bg-pattern-diamonds {
            background-image: linear-gradient(135deg, rgba(82, 82, 91, 0.2) 25%, transparent 25%), linear-gradient(225deg, rgba(82, 82, 91, 0.2) 25%, transparent 25%), linear-gradient(45deg, rgba(82, 82, 91, 0.2) 25%, transparent 25%), linear-gradient(315deg, rgba(82, 82, 91, 0.2) 25%, transparent 25%);
            background-position: 10px 0, 10px 0, 0 0, 0 0;
            background-size: 20px 20px;
        }

        .read-only-active .admin-only {
            display: none !important;
        }
    </style>

    {% if vehicle_data %}
    <style>
        /* The Jinja substitution below was previously split across multiple
           lines by an auto-formatter (`{ { vehicle_data.theme_color } }`),
           which Jinja does NOT recognise as an expression — so --accent
           never got a value and every bg-accent / text-accent / border-accent
           class silently fell back to nothing. Keep this on one line. */
        :root { --accent: {{ vehicle_data.theme_color or '#2563eb' }}; }

        .bg-accent { background-color: var(--accent); color: #fff; }
        .bg-accent:hover { filter: brightness(0.85); }
        .text-accent { color: var(--accent); }
        .border-accent { border-color: var(--accent); }
        .focus-ring-accent:focus { outline: none; box-shadow: 0 0 0 2px var(--accent); }
    </style>
    {% endif %}

    <script>
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('{{ ingress_path }}/sw.js');
        try { if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) document.documentElement.classList.add('dark'); } catch (e) { }

        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            try { localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light'); } catch (e) { }
        }

        function toggleReadOnly() {
            document.body.classList.toggle('read-only-active');
            const isLocked = document.body.classList.contains('read-only-active');
            document.getElementById('lock-icon').innerText = isLocked ? "🔒 Dashboard Locked" : "🔓 Dashboard Unlocked";
            try { localStorage.setItem('fleetReadOnly', isLocked); } catch (e) { }
        }

        function toggleSettingsModal() { document.getElementById('global-settings-modal').classList.toggle('hidden'); }

        let modalVin = '';
        let modalServiceId = '';

        // Live cache for service data so garage items persist across modal open/close without reload
        window._servicesCache = {};

        function _syncServiceCacheFromDOM() {
            document.querySelectorAll('[data-service]').forEach(btn => {
                try {
                    const s = JSON.parse(btn.dataset.service);
                    if (s && s.id) window._servicesCache[s.id] = s;
                } catch(e) {}
            });
        }

        function openServiceDetails(s, vin, isAdmin) {
            modalVin = vin;
            modalServiceId = s.id;

            // Always merge with live cache so garage items added this session are shown
            if (!window._servicesCache[s.id]) {
                window._servicesCache[s.id] = JSON.parse(JSON.stringify(s));
            }
            const live = window._servicesCache[s.id];

            document.getElementById('sd-name').innerText = live.name;
            document.getElementById('sd-category').innerText = live.category;

            let last_fmt = live.last_service_date_formatted && live.last_service_date_formatted !== "None" ? `${live.last_service_date_formatted} <span class="text-gray-400 mx-1">|</span> ${live.last_service_miles} {{ global_settings.unit }}` : "Never Logged";
            let due_fmt = live.due_date_str && live.due_date_str !== "TBD" ? `${live.due_date_str} <span class="text-gray-400 mx-1">|</span> ${live.due_miles} {{ global_settings.unit }}` : "TBD";
            let rem_fmt = live.miles_remaining && live.miles_remaining !== "N/A" ? `${live.miles_remaining} {{ global_settings.unit }} <span class="text-gray-400 mx-1">|</span> ${live.months_remaining} mo` : "Log service to track";

            document.getElementById('sd-last').innerHTML = last_fmt;
            document.getElementById('sd-due').innerHTML = due_fmt;
            document.getElementById('sd-remain').innerHTML = rem_fmt;
            document.getElementById('sd-status').innerText = live.status || "Unknown";

            renderGarageLists(live, isAdmin);

            // Always reset add forms when opening any service
            const _pf = document.getElementById('sd-add-part-form');
            const _tf = document.getElementById('sd-add-torque-form');
            _pf.reset(); _pf.classList.add('hidden');
            _tf.reset(); _tf.classList.add('hidden');

            if (isAdmin) {
                document.getElementById('sd-add-part-form').action = `{{ ingress_path }}/api/${vin}/service/${live.id}/add_garage_item`;
                document.getElementById('sd-add-torque-form').action = `{{ ingress_path }}/api/${vin}/add_torque`;
                document.getElementById('sd-torque-labels').value = live.name;
                document.getElementById('btn-toggle-part').classList.remove('hidden');
                document.getElementById('btn-toggle-torque').classList.remove('hidden');
            } else {
                document.getElementById('btn-toggle-part').classList.add('hidden');
                document.getElementById('btn-toggle-torque').classList.add('hidden');
                document.getElementById('sd-add-part-form').classList.add('hidden');
                document.getElementById('sd-add-torque-form').classList.add('hidden');
            }

            document.getElementById('service-details-modal').classList.remove('hidden');
        }

        function garagePartHtml(id, name, value, showDelete) {
            const del = showDelete ? `<button type="button" onclick="deleteGarageItem(this, '${id}', 'part')" class="text-red-400 hover:text-red-600 transition p-1 rounded hover:bg-red-50 dark:hover:bg-red-900/20" title="Remove">✕</button>` : '';
            return `<div id="part-${id}" class="flex items-center justify-between gap-3 bg-gray-50 dark:bg-zinc-800/60 border border-gray-200 dark:border-zinc-700 rounded-lg px-4 py-3">
                <span class="text-sm font-medium text-gray-700 dark:text-gray-300">${name}</span>
                <div class="flex items-center gap-2 shrink-0">
                    <span class="text-xs font-bold text-gray-800 dark:text-gray-100 bg-white dark:bg-zinc-900 border border-gray-200 dark:border-zinc-700 px-2.5 py-1 rounded-md shadow-sm">${value}</span>
                    ${del}
                </div>
            </div>`;
        }

        function garageTorqueHtml(id, name, val, isGlobal, showDelete) {
            let badge = '';
            if (isGlobal) badge = '<span class="text-[10px] font-medium text-gray-400 dark:text-zinc-500 italic px-2 py-0.5 bg-gray-100 dark:bg-zinc-800 rounded" title="Auto-linked from Global Specs">Auto</span>';
            else if (showDelete) badge = `<button type="button" onclick="deleteGarageItem(this, '${id}', 'torque')" class="text-red-400 hover:text-red-600 transition p-1 rounded hover:bg-red-50 dark:hover:bg-red-900/20" title="Remove">✕</button>`;
            return `<div id="torque-${id}" class="flex items-center justify-between gap-3 bg-accent/5 dark:bg-accent/10 border border-accent/20 rounded-lg px-4 py-3">
                <span class="text-sm font-medium text-gray-700 dark:text-gray-300">${name}</span>
                <div class="flex items-center gap-2 shrink-0">
                    <span class="text-sm font-bold text-accent bg-white dark:bg-zinc-900 border border-accent/30 px-2.5 py-1 rounded-md shadow-sm">${val}</span>
                    ${badge}
                </div>
            </div>`;
        }

        function renderGarageLists(s, isAdmin) {
            let partsHtml = '';
            if (s.garage_parts && s.garage_parts.length > 0) {
                s.garage_parts.forEach(p => { partsHtml += garagePartHtml(p.id, p.name, p.value, isAdmin); });
            } else { partsHtml = '<p class="text-xs text-gray-400 dark:text-zinc-500 italic py-3 text-center no-data">No parts linked yet.</p>'; }
            document.getElementById('sd-parts-list').innerHTML = partsHtml;

            let autoTorques = [];
            try {
                const globalTorques = JSON.parse(document.getElementById('global-torque-data').textContent);
                const sNameLower = s.name.toLowerCase();
                autoTorques = globalTorques.filter(t => {
                    if (!t.labels) return false;
                    return t.labels.toLowerCase().split(',').map(l => l.trim()).some(l => sNameLower.includes(l));
                });
            } catch (e) { }

            let torqueHtml = '';
            const combinedTorques = [...(s.garage_torque || []), ...autoTorques];
            const seen = new Set();
            const uniqueTorques = combinedTorques.filter(t => {
                const name = t.name || t.component;
                if (seen.has(name)) return false;
                seen.add(name); return true;
            });

            if (uniqueTorques.length > 0) {
                uniqueTorques.forEach(t => {
                    const name = t.name || t.component;
                    const val = t.value || t.torque;
                    const isGlobal = !!t.component;
                    torqueHtml += garageTorqueHtml(t.id, name, val, isGlobal, isAdmin);
                });
            } else { torqueHtml = '<p class="text-xs text-gray-400 dark:text-zinc-500 italic py-3 text-center no-data">No torque specs linked yet.</p>'; }
            document.getElementById('sd-torque-list').innerHTML = torqueHtml;
        }

        async function submitGaragePart(e) {
            e.preventDefault();
            const form = e.target;
            const btn = form.querySelector('button[type="submit"]');
            const origText = btn.textContent;
            btn.disabled = true; btn.textContent = 'Saving...';
            try {
                const formData = new FormData(form);
                const res = await fetch(form.action, { method: 'POST', body: formData, headers: { 'Accept': 'application/json' } });
                const data = await res.json();
                if (data.status === 'success') {
                    const html = garagePartHtml(data.id, formData.get('name'), formData.get('value'), true);
                    const list = document.getElementById('sd-parts-list');
                    const noData = list.querySelector('.no-data'); if (noData) noData.remove();
                    list.insertAdjacentHTML('beforeend', html);
                    // Update live cache so reopening the modal shows the new item
                    if (window._servicesCache[modalServiceId]) {
                        window._servicesCache[modalServiceId].garage_parts = window._servicesCache[modalServiceId].garage_parts || [];
                        window._servicesCache[modalServiceId].garage_parts.push({ id: data.id, name: formData.get('name'), value: formData.get('value') });
                    }
                    form.reset(); form.classList.add('hidden');
                } else {
                    alert('Could not save part. Please try again.');
                }
            } catch(err) {
                alert('Network error. Please try again.');
            } finally {
                btn.disabled = false; btn.textContent = origText;
            }
        }

        async function submitGarageTorque(e) {
            e.preventDefault();
            const form = e.target;
            const formData = new FormData(form);
            const res = await fetch(form.action, { method: 'POST', body: formData, headers: { 'Accept': 'application/json' } });
            const data = await res.json();
            if (data.status === 'success') {
                const html = garageTorqueHtml(data.id, formData.get('component'), formData.get('torque'), false, true);
                const list = document.getElementById('sd-torque-list');
                const noData = list.querySelector('.no-data'); if (noData) noData.remove();
                list.insertAdjacentHTML('beforeend', html);
                // Update live cache so reopening modal shows the new torque item
                if (window._servicesCache[modalServiceId]) {
                    window._servicesCache[modalServiceId].garage_torque = window._servicesCache[modalServiceId].garage_torque || [];
                    window._servicesCache[modalServiceId].garage_torque.push({ id: data.id, name: formData.get('component'), value: formData.get('torque') });
                }
                form.reset(); form.classList.add('hidden');

                try {
                    const gt = JSON.parse(document.getElementById('global-torque-data').textContent);
                    const newEntry = { id: data.id, component: formData.get('component'), torque: formData.get('torque'), labels: formData.get('labels') || '' };
                    gt.push(newEntry);
                    document.getElementById('global-torque-data').textContent = JSON.stringify(gt);

                    // Also sync the Glovebox & Specs tab torque table if it is present in the DOM
                    const specsTbody = document.getElementById('torque-specs-tbody');
                    if (specsTbody && typeof buildTorqueRow === 'function') {
                        const emptyRow = document.getElementById('torque-empty-row');
                        if (emptyRow) emptyRow.remove();
                        specsTbody.insertAdjacentHTML('beforeend', buildTorqueRow(newEntry, true));
                    }
                } catch (err) { }
            }
        }

        async function deleteGarageItem(btn, itemId, type) {
            if (!confirm('Delete this item?')) return;
            const res = await fetch(`{{ ingress_path }}/api/${modalVin}/service/${modalServiceId}/delete_garage_item/${type}/${itemId}`, { method: 'POST', headers: { 'Accept': 'application/json' } });
            if ((await res.json()).status === 'success') {
                document.getElementById(`${type}-${itemId}`).remove();
                // Update live cache
                const svc = window._servicesCache[modalServiceId];
                if (svc) {
                    const key = `garage_${type}s`;
                    if (svc[key]) svc[key] = svc[key].filter(i => i.id !== itemId);
                }
            }
        }

        async function deleteGlobalTorque(btn, torqueId) {
            if (!confirm('Permanently delete this torque spec?')) return;
            const res = await fetch(`{{ ingress_path }}/api/${modalVin}/delete_torque/${torqueId}`, { method: 'POST', headers: { 'Accept': 'application/json' } });
            if ((await res.json()).status === 'success') document.getElementById(`torque-${torqueId}`).remove();
        }

        async function submitLogService(btn) {
            const container = btn.closest('.log-service-form');
            const action = container.dataset.action;
            const formData = new FormData();
            container.querySelectorAll('[name]').forEach(el => formData.append(el.name, el.value));
            const dateInput = container.querySelector('[name="date"]');
            const mileageInput = container.querySelector('[name="mileage"]');
            if (!dateInput.value || !mileageInput.value) { dateInput.reportValidity(); return; }
            btn.disabled = true;
            btn.textContent = '⏳ Saving...';
            try {
                const res = await fetch(action, { method: 'POST', body: formData, headers: { 'Accept': 'application/json' } });
                const data = await res.json();
                if (data.status === 'success') {
                    btn.textContent = '✓ Logged!';
                    btn.classList.add('opacity-60');
                    if (data.log) injectLogEntry(data.log);
                    if (data.service) updateServiceCard(container, data.service);
                    setTimeout(() => { btn.textContent = '✓ Log Service'; btn.disabled = false; btn.classList.remove('opacity-60'); }, 2000);
                } else { throw new Error('Failed'); }
            } catch (err) {
                btn.textContent = '✗ Error';
                btn.disabled = false;
                setTimeout(() => { btn.textContent = '✓ Log Service'; }, 2000);
            }
        }

        function injectLogEntry(log) {
            const logList = document.querySelector('#logbook .space-y-3');
            if (!logList) return;
            const currency = '{{ global_settings.currency }}';
            const unit = '{{ global_settings.unit }}';
            const totalCost = ((log.cost_parts || 0) + (log.cost_labor || 0)).toFixed(2);
            const mileageFmt = Number(log.mileage).toLocaleString();
            const costFmt = Number(totalCost).toLocaleString('en', {minimumFractionDigits: 2, maximumFractionDigits: 2});
            const notesHtml = log.notes ? `<p class="text-sm text-gray-500 dark:text-zinc-400 italic mt-0.5 border-t border-gray-100 dark:border-zinc-800 pt-1 border-dashed">${log.notes}</p>` : '';
            const ingress = '{{ ingress_path }}';
            const vin = '{{ current_vin }}';
            const html = `
            <div class="bg-white dark:bg-zinc-900 border dark:border-zinc-800 p-4 rounded-lg shadow-sm transition-all ring-2 ring-green-400 dark:ring-green-600" id="log-entry-new-${log.id}">
                <div id="view-log-${log.id}" class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                    <div class="w-full md:w-32 shrink-0 border-b md:border-b-0 border-gray-100 dark:border-zinc-800 pb-2 md:pb-0"><p class="text-[10px] text-gray-500 dark:text-zinc-400 font-bold uppercase tracking-wide mb-1">Date</p><p class="font-bold text-gray-800 dark:text-gray-100">${log.date}</p></div>
                    <div class="flex-1 w-full md:border-l md:border-r border-gray-100 dark:border-zinc-800 md:px-4"><p class="text-[10px] text-gray-500 dark:text-zinc-400 font-bold uppercase tracking-wide mb-1">Service</p><p class="font-bold text-lg text-gray-800 dark:text-gray-100">${log.service}</p>${notesHtml}</div>
                    <div class="w-full md:w-32 text-left md:text-center shrink-0"><p class="text-[10px] text-gray-500 dark:text-zinc-400 font-bold uppercase tracking-wide mb-1 hidden md:block">Cost</p><p class="font-bold text-lg text-emerald-600 dark:text-emerald-400">${currency}${costFmt}</p></div>
                    <div class="w-full md:w-32 text-left md:text-center shrink-0"><p class="text-[10px] text-gray-500 dark:text-zinc-400 font-bold uppercase tracking-wide mb-1 hidden md:block">Mileage</p><p class="font-bold text-xl text-accent">${mileageFmt} <span class="text-xs font-normal text-gray-500 dark:text-zinc-400 uppercase">${unit}</span></p></div>
                    <div class="flex gap-2 w-full md:w-auto mt-2 md:mt-0 justify-end shrink-0 admin-only">
                        <form action="${ingress}/api/${vin}/delete_log/${log.id}" method="POST" onsubmit="return confirm('Delete entry?');"><button type="submit" class="bg-red-50 dark:bg-red-900/20 text-red-700 dark:text-red-400 text-xs py-2 px-4 rounded-md font-bold transition">Delete</button></form>
                    </div>
                </div>
            </div>`;
            logList.insertAdjacentHTML('afterbegin', html);
            // Fade out the highlight ring after a moment
            setTimeout(() => {
                const el = document.getElementById(`log-entry-new-${log.id}`);
                if (el) { el.classList.remove('ring-2', 'ring-green-400', 'dark:ring-green-600'); }
            }, 3000);
        }

        function updateServiceCard(container, svc) {
            const card = container.closest('.service-card');
            if (!card) return;
            const unit = '{{ global_settings.unit }}';

            card.dataset.status = svc.status;
            card.dataset.priority = svc.priority;

            const allStatusClasses = [
                'bg-red-50','dark:bg-red-900/10','border-red-200','dark:border-red-900/30',
                'bg-yellow-50','dark:bg-yellow-900/10','border-yellow-200','dark:border-yellow-900/30',
                'bg-blue-50','dark:bg-blue-900/10','border-blue-200','dark:border-blue-900/30',
                'bg-gray-50','dark:bg-zinc-800/50','opacity-90','shadow-sm'
            ];
            allStatusClasses.forEach(cls => card.classList.remove(cls));
            const cardClasses = {
                'Past Due':       ['bg-red-50','dark:bg-red-900/10','border-red-200','dark:border-red-900/30','shadow-sm'],
                'Coming Up':      ['bg-yellow-50','dark:bg-yellow-900/10','border-yellow-200','dark:border-yellow-900/30'],
                'Needs Baseline': ['bg-blue-50','dark:bg-blue-900/10','border-blue-200','dark:border-blue-900/30','shadow-sm'],
                'All Good':       ['bg-gray-50','dark:bg-zinc-800/50','opacity-90']
            };
            (cardClasses[svc.status] || cardClasses['All Good']).forEach(cls => card.classList.add(cls));

            const badge = card.querySelector('.flex.justify-between.items-start > span');
            if (badge) {
                badge.textContent = svc.status;
                const allBadgeClasses = [
                    'bg-red-100','text-red-700','border-red-200','dark:bg-red-900/30','dark:text-red-400','dark:border-red-800',
                    'bg-yellow-100','text-yellow-700','border-yellow-200','dark:bg-yellow-900/30','dark:text-yellow-400','dark:border-yellow-800',
                    'bg-blue-100','text-blue-700','border-blue-200','dark:bg-blue-900/30','dark:text-blue-400','dark:border-blue-800',
                    'bg-green-100','text-green-700','border-green-200','dark:bg-green-900/30','dark:text-green-400','dark:border-green-800'
                ];
                allBadgeClasses.forEach(cls => badge.classList.remove(cls));
                const badgeClasses = {
                    'Past Due':       ['bg-red-100','text-red-700','border-red-200','dark:bg-red-900/30','dark:text-red-400','dark:border-red-800'],
                    'Coming Up':      ['bg-yellow-100','text-yellow-700','border-yellow-200','dark:bg-yellow-900/30','dark:text-yellow-400','dark:border-yellow-800'],
                    'Needs Baseline': ['bg-blue-100','text-blue-700','border-blue-200','dark:bg-blue-900/30','dark:text-blue-400','dark:border-blue-800'],
                    'All Good':       ['bg-green-100','text-green-700','border-green-200','dark:bg-green-900/30','dark:text-green-400','dark:border-green-800']
                };
                (badgeClasses[svc.status] || badgeClasses['All Good']).forEach(cls => badge.classList.add(cls));
            }

            const title = card.querySelector('h3');
            if (title) {
                title.classList.toggle('text-red-700', svc.status === 'Past Due');
                title.classList.toggle('dark:text-red-400', svc.status === 'Past Due');
                title.classList.toggle('text-gray-800', svc.status !== 'Past Due');
                title.classList.toggle('dark:text-gray-100', svc.status !== 'Past Due');
            }

            const statsRows = card.querySelectorAll('.text-xs.space-y-2 .flex.justify-between.items-center');
            const lastServiceSpan = statsRows[0] ? statsRows[0].querySelector('span:last-child') : null;
            const dueAtSpan = statsRows[1] ? statsRows[1].querySelector('span:last-child') : null;
            const remainingRow = card.querySelector('.text-xs.space-y-2 .flex.justify-between.mt-3');
            const remainingSpan = remainingRow ? remainingRow.querySelector('span:last-child') : null;

            if (lastServiceSpan) {
                if (svc.status === 'Needs Baseline') {
                    lastServiceSpan.textContent = 'Never Logged';
                } else {
                    lastServiceSpan.innerHTML = `${svc.last_service_date_display} <span class="text-gray-300 dark:text-zinc-600 mx-1">|</span> ${Number(svc.last_service_miles).toLocaleString()} ${unit}`;
                }
            }

            if (dueAtSpan) {
                if (svc.status === 'Needs Baseline') {
                    dueAtSpan.textContent = 'TBD';
                    dueAtSpan.classList.remove('border-accent', 'text-accent');
                } else {
                    const prefix = svc.predicted ? '🔮 ' : '';
                    dueAtSpan.innerHTML = `${prefix}${svc.due_date_display} <span class="text-gray-300 dark:text-zinc-600 mx-1">|</span> ${Number(svc.due_miles).toLocaleString()} ${unit}`;
                    dueAtSpan.classList.toggle('border-accent', !!svc.predicted);
                    dueAtSpan.classList.toggle('text-accent', !!svc.predicted);
                }
            }

            if (remainingSpan) {
                remainingSpan.classList.toggle('text-red-600', svc.status === 'Past Due');
                remainingSpan.classList.toggle('dark:text-red-400', svc.status === 'Past Due');
                remainingSpan.classList.toggle('text-gray-800', svc.status !== 'Past Due');
                remainingSpan.classList.toggle('dark:text-gray-100', svc.status !== 'Past Due');
                if (svc.status === 'Needs Baseline') {
                    remainingSpan.textContent = 'Log service to track';
                } else {
                    remainingSpan.innerHTML = `${Number(svc.miles_remaining).toLocaleString()} ${unit} <span class="text-gray-300 dark:text-zinc-600 mx-1">|</span> ${svc.months_remaining} mo`;
                }
            }

            const garageBtn = card.querySelector('[data-service]');
            if (garageBtn) {
                const cached = JSON.parse(garageBtn.dataset.service || '{}');
                const updated = Object.assign({}, cached, {
                    status: svc.status, last_service_date: svc.last_service_date,
                    last_service_miles: svc.last_service_miles
                });
                garageBtn.dataset.service = JSON.stringify(updated);
                if (window._servicesCache && updated.id) window._servicesCache[updated.id] = updated;
            }
        }

        function closeServiceDetails() {
            document.getElementById('service-details-modal').classList.add('hidden');
            // Reset and hide the add forms so they don't persist on next open
            const partForm = document.getElementById('sd-add-part-form');
            const torqueForm = document.getElementById('sd-add-torque-form');
            partForm.reset(); partForm.classList.add('hidden');
            torqueForm.reset(); torqueForm.classList.add('hidden');
        }

        document.addEventListener('DOMContentLoaded', () => {
            // Populate live services cache from rendered DOM
            _syncServiceCacheFromDOM();

            try {
                const savedTexture = localStorage.getItem('fleetBgTexture') || 'bg-pattern-solid';
                document.body.classList.add(savedTexture);
                if (document.getElementById('texture-selector')) document.getElementById('texture-selector').value = savedTexture;
                if (localStorage.getItem('fleetReadOnly') === 'true') toggleReadOnly();
            } catch (e) { }

            // Restore the active tab (defaults to 'summary').
            // This also fixes the blank view after "Log Service" submits a POST
            // and reloads the page, because the tab would otherwise stay hidden.
            try {
                const savedTab = localStorage.getItem('fleetActiveTab') || 'summary';
                const tabEl = document.getElementById(savedTab);
                showTab(tabEl ? savedTab : 'summary');
            } catch (e) {
                showTab('summary');
            }
        });

        function changeTexture(texture) {
            document.body.classList.remove('bg-pattern-solid', 'bg-pattern-dots', 'bg-pattern-grid', 'bg-pattern-ripples', 'bg-pattern-diamonds');
            document.body.classList.add(texture);
            try { localStorage.setItem('fleetBgTexture', texture); } catch (e) { }
        }

        function _firstVisibleTabId() {
            // Tab buttons live inside <li> elements that may have been hidden
            // by Jinja conditionals (see global_settings.hidden_tabs). Use
            // offsetParent === null as a cheap "is rendered + visible" probe.
            const candidates = ['summary','timeline','intervals','logbook','fuel','specs'];
            for (const t of candidates) {
                const btn = document.getElementById('btn-' + t);
                if (btn && btn.offsetParent !== null) return t;
            }
            return null;
        }

        function showTab(tabId) {
            // If caller asked for a tab that's been hidden by the user, pick
            // the first visible one instead so we never leave the page blank.
            const requestedBtn = document.getElementById('btn-' + tabId);
            if (tabId !== 'add-vehicle' && (!requestedBtn || requestedBtn.offsetParent === null)) {
                const fallback = _firstVisibleTabId();
                if (fallback) tabId = fallback;
            }

            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(el => {
                el.classList.remove('border-accent', 'text-accent');
                el.classList.add('border-transparent', 'text-gray-500', 'dark:text-zinc-400');
            });
            const content = document.getElementById(tabId);
            if (content) {
                content.classList.remove('hidden');
                if (tabId !== 'add-vehicle') try { localStorage.setItem('fleetActiveTab', tabId); } catch (e) { }
            }
            const btn = document.getElementById('btn-' + tabId);
            if (btn) {
                btn.classList.remove('border-transparent', 'text-gray-500', 'dark:text-zinc-400');
                btn.classList.add('border-accent', 'text-accent');
            }
        }

        function toggleVehicleSettings() {
            document.getElementById('settings-edit').classList.toggle('hidden');
        }

        function toggleEdit(type, id) {
            document.getElementById('view-' + type + '-' + id).classList.toggle('hidden');
            const editEl = document.getElementById('edit-' + type + '-' + id);
            editEl.classList.toggle('hidden');
            editEl.classList.toggle('flex');
        }

        function updateSelectionToolbar(section) {
            const checked = document.querySelectorAll('.' + section + '-checkbox:checked');
            const all = document.querySelectorAll('.' + section + '-checkbox');
            const toolbar = document.getElementById(section + '-selection-toolbar');
            const countEl = document.getElementById(section + '-selected-count');
            const selectAllCb = document.getElementById(section + '-select-all');
            if (toolbar) toolbar.classList.toggle('hidden', checked.length === 0);
            if (countEl) countEl.textContent = checked.length + ' selected';
            if (selectAllCb) {
                selectAllCb.checked = all.length > 0 && checked.length === all.length;
                selectAllCb.indeterminate = checked.length > 0 && checked.length < all.length;
            }
        }

        function selectAll(section, checked) {
            document.querySelectorAll('.' + section + '-checkbox').forEach(cb => cb.checked = checked);
            updateSelectionToolbar(section);
        }

        function clearSelection(section) {
            document.querySelectorAll('.' + section + '-checkbox').forEach(cb => cb.checked = false);
            updateSelectionToolbar(section);
        }

        function editSelected(section) {
            const selected = Array.from(document.querySelectorAll('.' + section + '-checkbox:checked'));
            if (selected.length > 1) {
                openBulkEditModal(section);
            } else if (selected.length === 1) {
                const id = selected[0].dataset.id;
                const viewEl = document.getElementById('view-' + section + '-' + id);
                if (viewEl && !viewEl.classList.contains('hidden')) toggleEdit(section, id);
                clearSelection(section);
            }
        }

        const _BULK_FIELDS = {
            interval: [
                { name: 'category',        label: 'Category',              type: 'text'   },
                { name: 'name',            label: 'Service Name',          type: 'text'   },
                { name: 'parts_info',      label: 'Required Parts / Notes',type: 'text'   },
                { name: 'interval_months', label: 'Months',                type: 'number' },
                { name: 'interval_miles',  label: 'Miles',                 type: 'number' },
            ],
            log: [
                { name: 'date',        label: 'Date',        type: 'date'   },
                { name: 'service',     label: 'Service',     type: 'text'   },
                { name: 'mileage',     label: 'Mileage',     type: 'number' },
                { name: 'cost_parts',  label: 'Parts Cost',  type: 'number' },
                { name: 'cost_labor',  label: 'Labor Cost',  type: 'number' },
                { name: 'notes',       label: 'Notes',       type: 'text'   },
            ],
        };
        const _BULK_ENDPOINTS = { interval: 'batch_update_services', log: 'batch_update_logs' };
        const _BULK_LABELS    = { interval: 'Intervals', log: 'Logbook Entries' };

        let _bulkSection = null, _bulkIds = [], _bulkVin = '', _bulkIngress = '';

        function openBulkEditModal(section) {
            const selected = Array.from(document.querySelectorAll('.' + section + '-checkbox:checked'));
            if (!selected.length) return;
            _bulkIds     = selected.map(cb => cb.dataset.id);
            _bulkSection = section;
            const toolbar   = document.getElementById(section + '-selection-toolbar');
            _bulkVin        = toolbar ? toolbar.dataset.vin    : '';
            _bulkIngress    = toolbar ? toolbar.dataset.ingress : '';

            const fields = _BULK_FIELDS[section] || [];
            document.getElementById('bulk-edit-fields').innerHTML = fields.map(f => `
                <div class="flex flex-col gap-1">
                    <span class="text-[10px] text-gray-500 dark:text-zinc-400 font-bold uppercase tracking-wide">${f.label}</span>
                    <input type="${f.type}" name="${f.name}" placeholder="Leave blank to keep existing"
                        class="text-sm border dark:border-zinc-600 rounded p-2 w-full bg-white dark:bg-zinc-900 dark:text-white"
                        ${f.type === 'number' ? 'min="0" step="any"' : ''}>
                </div>
            `).join('');
            document.getElementById('bulk-edit-title').textContent =
                'Edit ' + _bulkIds.length + ' Selected ' + (_BULK_LABELS[section] || section);
            document.getElementById('bulk-edit-modal').classList.remove('hidden');
            document.querySelector('#bulk-edit-fields input')?.focus();
        }

        function closeBulkEditModal() {
            document.getElementById('bulk-edit-modal').classList.add('hidden');
            _bulkSection = null; _bulkIds = [];
        }

        async function saveBulkEdit() {
            const fields  = _BULK_FIELDS[_bulkSection] || [];
            const updates = {};
            fields.forEach(f => {
                const el = document.querySelector('#bulk-edit-fields input[name="' + f.name + '"]');
                if (el && el.value.trim() !== '')
                    updates[f.name] = f.type === 'number' ? Number(el.value) : el.value.trim();
            });
            if (!Object.keys(updates).length) { closeBulkEditModal(); clearSelection(_bulkSection); return; }
            const endpoint = _BULK_ENDPOINTS[_bulkSection];
            const res  = await fetch(_bulkIngress + '/api/' + _bulkVin + '/' + endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                body: JSON.stringify({ ids: _bulkIds, updates }),
            });
            const data = await res.json();
            closeBulkEditModal();
            clearSelection(_bulkSection);
            if (data.status === 'success') window.location.reload();
            else alert('Could not update selected items.');
        }

        async function deleteSelected(section) {
            const selected = Array.from(document.querySelectorAll('.' + section + '-checkbox:checked'));
            const ids = selected.map(cb => cb.dataset.id);
            if (!ids.length) return;
            if (!confirm('Delete ' + ids.length + ' selected item' + (ids.length > 1 ? 's' : '') + '?')) return;
            const toolbar = document.getElementById(section + '-selection-toolbar');
            const vin = toolbar ? toolbar.dataset.vin : '';
            const ingress = toolbar ? toolbar.dataset.ingress : '';
            const endpointMap = { interval: 'batch_delete_services', log: 'batch_delete_logs' };
            const endpoint = endpointMap[section];
            if (!endpoint || !vin) return;
            const res = await fetch(ingress + '/api/' + vin + '/' + endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                body: JSON.stringify({ ids })
            });
            const data = await res.json();
            if (data.status === 'success') {
                ids.forEach(id => {
                    const viewEl = document.getElementById('view-' + section + '-' + id);
                    if (viewEl) viewEl.parentElement.remove();
                });
                clearSelection(section);
            } else {
                alert('Could not delete selected items.');
                window.location.reload();
            }
        }

        function toggleDropdown(event) {
            if (event) event.stopPropagation();
            document.getElementById('vehicleDropdown').classList.toggle('hidden');
        }

        document.addEventListener('click', function (event) {
            const dropdown = document.getElementById('vehicleDropdown');
            if (dropdown && !dropdown.classList.contains('hidden') && !dropdown.contains(event.target) && !document.getElementById('vehicleDropdownBtn').contains(event.target)) dropdown.classList.add('hidden');
        });

        function filterAndSortSummary() {
            const searchText = document.getElementById('search-service').value.toLowerCase();
            const statusFilter = document.getElementById('filter-status').value;
            const sortType = document.getElementById('sort-status').value;
            const container = document.getElementById('summary-grid');

            let cards = Array.from(container.querySelectorAll('.service-card'));

            cards.forEach(card => {
                const name = card.getAttribute('data-name');
                const status = card.getAttribute('data-status');
                const matchesSearch = name.includes(searchText);
                let matchesStatus = (statusFilter === 'all' || (statusFilter === 'problems' && (status === 'Past Due' || status === 'Coming Up')) || status === statusFilter);
                card.style.display = (matchesSearch && matchesStatus) ? 'flex' : 'none';
            });

            cards.sort((a, b) => {
                if (sortType === 'alpha') return a.dataset.name.localeCompare(b.dataset.name);
                return a.dataset.priority - b.dataset.priority;
            });

            cards.forEach(card => container.appendChild(card));
        }

        async function runVinDecode() {
            const vin = document.getElementById('new_vin').value;
            if (!vin) return alert("Enter a VIN first!");
            const btn = document.getElementById('decode_btn');
            btn.innerText = "Decoding...";
            try {
                const res = await fetch('{{ ingress_path }}/api/decode_vin/' + vin);
                const data = await res.json();
                document.getElementById('new_make').value = data.make || '';
                document.getElementById('new_model').value = data.model || '';
                document.getElementById('new_year').value = data.year || '';
            } catch (e) { alert("Could not decode VIN."); }
            btn.innerText = "Decode VIN";
        }

        function copyGuestLink(token) {
            const fullLink = window.location.origin + '{{ ingress_path }}/share/' + token;
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(fullLink).then(() => { alert('Guest link copied to clipboard!'); }).catch(err => { prompt("Please copy the link below:", fullLink); });
            } else {
                let textArea = document.createElement("textarea");
                textArea.value = fullLink;
                textArea.style.position = "fixed"; textArea.style.left = "-999999px";
                document.body.appendChild(textArea);
                textArea.focus(); textArea.select();
                try { document.execCommand('copy'); alert('Guest link copied to clipboard!'); } catch (err) { prompt("Please copy the link manually:", fullLink); }
                textArea.remove();
            }
        }

        // ==========================================
        // PHASE 4: THE NEW, SMART AI PROMPT GENERATOR (WITH HTTP FALLBACK)
        // ==========================================
        function copyPrompt(type) {
            let promptText = "";

            // 1. Secretly scrape your database vocabulary
            const servicesList = JSON.parse('{{ vehicle_data.services | map(attribute="name") | list | tojson | safe if vehicle_data else "[]" }}');
            const servicesStr = servicesList.length > 0 ? servicesList.join(', ') : "None currently configured";

            // 2. The universal fail-safe rule
            const fallbackRule = "\n\nCRITICAL RULE: If you find maintenance records or torque specs that do not perfectly match the exact service names provided above, STOP. Do not force it to match. Instead, leave the service name/label blank in the CSV. Then, at the end of your response outside the CSV code block, list the unmatched items and ask the user exactly this: 'I found these unmatched tasks. Should I create new service categories for them? You can choose All, Some, or None.'";

            // 3. Assemble the context-aware prompt
            if (type === 'interval') {
                promptText = "Extract maintenance intervals into CSV code block. Columns must be exactly: Category, Service, Interval_Months, Interval_Miles.";
            } else if (type === 'logbook') {
                promptText = `Format this maintenance history into a CSV code block. Columns must be exactly: Date, Service, Mileage, Notes, Parts, Labor. Format Date: YYYY-MM-DD. \n\nYou MUST map past maintenance to these exact service names: [${servicesStr}].` + fallbackRule;
            } else if (type === 'torque') {
                promptText = `Extract torque specifications from the following text into a CSV code block. Columns must be exactly: Component, Torque, Labels. \n\nWhen assigning a 'Label' to auto-link it to a job, you MUST use exact matches from this list: [${servicesStr}].` + fallbackRule;
            }

            // 4. Success UI Helper
            const btn = document.getElementById('copy_btn_' + type);
            const originalText = btn ? btn.innerText : "";
            function showSuccess() {
                if (btn) {
                    btn.innerText = "✅ Copied!";
                    setTimeout(() => btn.innerText = originalText, 2000);
                } else { alert('AI Prompt Copied!'); }
            }

            // 5. Send to clipboard (Secure vs HTTP Fallback)
            if (navigator.clipboard && window.isSecureContext) {
                // Secure HTTPS Context
                navigator.clipboard.writeText(promptText)
                    .then(showSuccess)
                    .catch(() => alert('Browser blocked clipboard. Please copy manually.'));
            } else {
                // HTTP / Local Network Fallback Method
                let textArea = document.createElement("textarea");
                textArea.value = promptText;
                textArea.style.position = "fixed";
                textArea.style.left = "-999999px";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                try {
                    document.execCommand('copy');
                    showSuccess();
                } catch (err) {
                    alert('Browser blocked clipboard. Please copy manually.');
                }
                textArea.remove();
            }
        }
    </script>
</head>

<body
    class="bg-gray-100 dark:bg-zinc-950 text-gray-800 dark:text-gray-200 p-4 font-sans transition-colors duration-200">

    {% block content %}{% endblock %}

    <!-- Bulk Edit Modal (intervals + logbook) -->
    <div id="bulk-edit-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-4">
        <div class="bg-white dark:bg-zinc-900 border dark:border-zinc-700 rounded-xl shadow-2xl w-full max-w-lg">
            <div class="p-6">
                <h2 id="bulk-edit-title" class="text-lg font-bold text-gray-800 dark:text-gray-100 mb-1">Bulk Edit</h2>
                <p class="text-xs text-gray-500 dark:text-zinc-400 mb-4">Leave a field blank to keep existing values. Filled fields apply to all selected items.</p>
                <div id="bulk-edit-fields" class="flex flex-col gap-3"></div>
            </div>
            <div class="flex gap-2 justify-end px-6 pb-5">
                <button type="button" onclick="closeBulkEditModal()" class="bg-gray-200 dark:bg-zinc-700 text-gray-800 dark:text-gray-200 text-sm py-2 px-4 rounded-md font-bold hover:bg-gray-300 dark:hover:bg-zinc-600 transition">Cancel</button>
                <button type="button" onclick="saveBulkEdit()" class="bg-accent text-white text-sm py-2 px-5 rounded-md font-bold shadow hover:opacity-90 transition">Apply to All</button>
            </div>
        </div>
    </div>

</body>

</html>
